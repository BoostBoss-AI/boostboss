  var ARTICLES = {

    'getting-started': {
      title: 'Getting started as a Boost Boss affiliate',
      lede: 'Boost Boss is an MCP-native ad network. As an affiliate you save ads you discover inside AI tools, share them with your audience, and earn when they buy. Here\'s the 60-second tour.',
      related: ['saving-ads', 'share-links', 'commission-model', 'payout-setup'],
      body: '\
<h2>What Boost Boss is, in one paragraph</h2>\
<p>Boost Boss serves sponsored content inside AI surfaces — Claude Desktop, Cursor, ChatGPT plugins, Discord and Slack bots, browser extensions. Advertisers run campaigns and pay per impression / click / purchase. Affiliates promote products from the catalog and earn a commission when buyers convert through their share link.</p>\
\
<h2>Three things to do in your first 10 minutes</h2>\
<ol>\
  <li><strong>Browse the catalog.</strong> Open <a href="/affiliate#catalog">Product Catalog</a> in the sidebar and look at what advertisers have registered. Sort by commission to find high-converting offers.</li>\
  <li><strong>Mint your first share link.</strong> Click "Get Link" on any product you want to promote. The link routes through <code>/s/&lt;token&gt;</code> which redirects with a <code>bb_click=&lt;UUID&gt;</code> attribution parameter.</li>\
  <li><strong>Set up your payout method.</strong> Go to <a href="/affiliate#payouts">Payout Record</a> and add the PayPal email where you want to be paid. Without this, earnings accrue but don\'t settle.</li>\
</ol>\
\
<h2>How earnings work</h2>\
<p>When someone clicks your share link and buys, you earn a share of what Boost Boss calls the <strong>Affiliate Pool</strong> — a percentage of the order that the seller specifically funds for affiliate marketing. The split is <strong>70% to you / 30% to Boost Boss</strong>. See <a href="/help/article?id=commission-model">Commission Model v2 explained</a>.</p>\
\
<div class="callout info"><strong>Plain version:</strong> if a product has a 20% affiliate pool and someone buys $100 worth, Boost Boss takes the $20 pool, gives you $14 (70% of the pool), and keeps $6 (30%). The seller gets the remaining $80 minus PayPal\'s processor fees.</div>\
\
<h2>What to do next</h2>\
<ul>\
  <li>Read <a href="/help/article?id=share-links">how attribution works</a> so you understand the data behind your link clicks.</li>\
  <li>Skim <a href="/help/article?id=ftc-disclosure">FTC disclosure rules</a> — every public promotion needs a sponsorship disclosure.</li>\
  <li>Choose where you\'ll promote: <a href="/help/article?id=promote-social">social media</a>, <a href="/help/article?id=promote-newsletter">newsletter</a>, or both.</li>\
</ul>'
    },

    'saving-ads': {
      title: 'Saving ads & browsing the catalog',
      lede: 'Two ways to find products to promote: save an ad you spot inside an AI tool, or browse the full advertiser catalog from your dashboard.',
      related: ['getting-started', 'share-links', 'commission-model', 'exclusive-offers'],
      body: '\
<h2>Saving from inside an AI tool</h2>\
<p>When you see a Boost Boss-served ad in a tool like Cursor, Claude Desktop, or a Discord bot, tap the bookmark icon. The product lands in your <a href="/affiliate#saves">My Saves</a> view with one click — no manual entry, no copy-paste.</p>\
<p>What gets saved: the product (parent), not the individual creative. So if the advertiser runs multiple campaigns or seasonal variants for the same product, your saved entry still points at the right destination. New campaigns automatically use the best-active match at click-time.</p>\
\
<h2>Browsing the catalog</h2>\
<p><a href="/affiliate#catalog">Product Catalog</a> shows every advertiser product that\'s passed audit. Two filters matter most:</p>\
<ul>\
  <li><strong>Commission</strong> — sorts products by their affiliate pool percentage. Higher is more upside per sale.</li>\
  <li><strong>Category</strong> — narrows to a vertical (SaaS, infra, content tools, etc.) so you can match products to your audience.</li>\
</ul>\
\
<h2>What "audit-approved" means</h2>\
<p>Every product visible in the catalog has passed Boost Boss\'s audit — accurate description, working fulfilment URL, honest "original price" comparison (if displayed), valid refund path. Audit-rejected products don\'t appear in the catalog and can\'t be promoted.</p>\
<div class="callout"><strong>Why this matters to you:</strong> products in the catalog are vetted, so the conversion risk on your end is lower. You\'re not stuck promoting something that breaks at checkout or never delivers.</div>'
    },

    'share-links': {
      title: 'Share links & bb_click attribution',
      lede: 'How Boost Boss knows a sale came from your link, why the system survives cookie loss and Safari ITP, and what to put in your share links so analytics work for both you and the advertiser.',
      related: ['commission-model', 'clawback', 'promote-social', 'promote-newsletter'],
      body: '\
<h2>The basic flow</h2>\
<ol>\
  <li>You mint a share link in the dashboard. It looks like <code>https://boostboss.ai/s/&lt;token&gt;</code>.</li>\
  <li>Someone clicks it. Our redirect server appends <code>?bb_click=&lt;UUID&gt;</code> to the destination URL and 302-redirects them to the advertiser\'s product page.</li>\
  <li>The UUID is logged with your affiliate ID, click timestamp, referring URL, and a coarse region. We also drop a first-party cookie as fallback.</li>\
  <li>If a sale follows within the 30-day clawback window, the <code>bb_click</code> UUID on the buyer\'s purchase URL is what attributes the sale back to you.</li>\
</ol>\
\
<h2>Why URL-based attribution is load-bearing</h2>\
<p>Most affiliate networks rely on third-party cookies — which are blocked or capped by Safari ITP, Firefox ETP, and increasingly Chrome. Boost Boss treats the cookie as a fallback. The <strong>bb_click UUID in the URL is the load-bearing identifier</strong>. As long as the URL parameter survives to the conversion event, attribution works regardless of what the browser does.</p>\
\
<h2>What gets stripped</h2>\
<p>Some platforms strip URL parameters when users share links:</p>\
<ul>\
  <li><strong>Twitter/X</strong> generally preserves them.</li>\
  <li><strong>iMessage / SMS</strong> preserves them.</li>\
  <li><strong>Some Facebook posts</strong> add their own fbclid but preserve yours.</li>\
  <li><strong>Some email clients</strong> shorten URLs through a redirect — usually still preserves params.</li>\
</ul>\
<p>If your audience converts at a much lower rate than your clicks, check whether the URL is being mangled at the channel.</p>\
\
<h2>Sub IDs for channel tracking</h2>\
<p>When minting a link, you can add up to 5 Sub IDs (a-z, A-Z, 0-9). These don\'t affect attribution — they\'re tags you assign so you can later tell which channel brought the click. Example: <code>sub1=twitter</code>, <code>sub1=newsletter-may</code>. Visible in your <a href="/affiliate#conv-soon">Sales Report</a>.</p>'
    },

    'commission-model': {
      title: 'Commission Model v2 — 70/30 split explained',
      lede: 'How Boost Boss splits a sale between the seller, you, and the platform. The new model replaced a flat 15% top-line take with a per-product affiliate pool — clearer incentives and only earning when an affiliate drives the sale.',
      related: ['payout-setup', 'payout-schedule', 'clawback', 'getting-started'],
      body: '\
<h2>The shape of a sale</h2>\
<p>Every product on the catalog has an <strong>Affiliate Pool Percentage</strong> set by the seller. That\'s the share of the order that funds affiliate marketing. Boost Boss splits the pool 70 / 30 between the affiliate and the platform:</p>\
<ul>\
  <li><strong>70%</strong> → you (the affiliate who drove the sale)</li>\
  <li><strong>30%</strong> → Boost Boss</li>\
  <li><strong>Remainder</strong> → seller (the order value minus the affiliate pool minus PayPal processor fees)</li>\
</ul>\
\
<h2>A worked example</h2>\
<p>Product priced at <strong>$100</strong>, affiliate pool set by seller at <strong>20%</strong>.</p>\
<pre><code>Order value         $100.00\
Affiliate pool       $20.00  (20% of order)\
  → Affiliate         $14.00  (70% of pool)\
  → Boost Boss         $6.00  (30% of pool)\
Seller settles       $80.00  minus PayPal fees</code></pre>\
\
<h2>Direct vs affiliate sales</h2>\
<p>If a buyer purchases without an affiliate link (direct sale), Boost Boss takes no commission on the order value beyond standard payment processor pass-through. The seller keeps the entire order net of fees, taxes, and refunds. We only earn when an affiliate actually drove the sale.</p>\
<div class="callout info"><strong>Why this matters:</strong> the v2 model aligns our incentives with yours — Boost Boss only makes money when affiliates do. Under the old 15% flat top-line take, we earned on direct sales you had no part in.</div>\
\
<h2>CPS by default, CPC and CPA on opt-in</h2>\
<p>The default is <strong>cost-per-sale (CPS)</strong>: you earn only when a sale actually captures. Some advertisers opt their products into <strong>CPC</strong> (cost-per-click) or <strong>CPA</strong> (cost-per-action — e.g. signup) instead. When that\'s the case, you see the model on the catalog row and you earn on qualifying clicks or actions whether or not they convert to revenue.</p>'
    },

    'payout-setup': {
      title: 'Setting up your PayPal payout',
      lede: 'Boost Boss settles all affiliate payouts through PayPal. Add your PayPal email once in the dashboard and every biweekly Friday payout goes there automatically.',
      related: ['payout-schedule', 'commission-model', 'two-factor', 'clawback'],
      body: '\
<h2>Where to add your PayPal email</h2>\
<p>Go to <a href="/affiliate#payouts">Payout Record</a> in the sidebar. There\'s a Payout method form with one required field: <strong>PayPal email</strong>. Use the email tied to a verified PayPal account.</p>\
\
<h2>Why PayPal only, for now</h2>\
<p>Boost Boss operates on a single payment provider for both inbound payments (advertiser deposits, buyer storefront captures) and outbound payments (publisher, seller, and affiliate payouts). PayPal is the current provider because Taiwan\'s corporate law requires pay-in and payout through the same provider, and PayPal serves the largest cross-section of the global market. Additional methods are on the roadmap once we open up multi-provider options.</p>\
\
<h2>Account requirements</h2>\
<ul>\
  <li><strong>Verified PayPal account</strong> on the receiving end. Unverified accounts may hold funds.</li>\
  <li><strong>Country supported by PayPal Payouts API</strong> — 200+ countries supported; only a few aren\'t.</li>\
  <li><strong>Sanctions screening</strong> — Boost Boss can\'t pay accounts in jurisdictions under US or international sanctions (Iran, North Korea, Cuba, Crimea, Syria, etc.).</li>\
</ul>\
\
<h2>Changing your PayPal email later</h2>\
<p>You can change it anytime from the same screen, but the change requires <strong>two-factor authentication</strong>. We do this on purpose — anyone who can quietly rewrite your destination address can intercept your earnings. See <a href="/help/article?id=two-factor">Two-factor authentication</a>.</p>\
\
<div class="callout warn"><strong>Triple-check the spelling.</strong> If you mistype your PayPal email, the funds bounce back and you need to re-request the payout. Most "where\'s my payout?" tickets we get are typos.</div>'
    },

    'payout-schedule': {
      title: 'Payout schedule — biweekly Friday, Tuesday cutoff',
      lede: 'Boost Boss pays affiliates on a fixed biweekly cycle. Earn by Tuesday → get paid that Friday. Earn after Tuesday → wait two weeks. Minimum payout is $1 USD.',
      related: ['payout-setup', 'commission-model', 'clawback', 'two-factor'],
      body: '\
<h2>The cycle in one paragraph</h2>\
<p>Payouts run <strong>every other Friday</strong>. The cutoff is the immediately preceding <strong>Tuesday at 23:59 UTC</strong>. Earnings booked by the cutoff are included in that Friday\'s batch; earnings booked after the cutoff roll to the next Friday two weeks later.</p>\
\
<h2>What ends up in a batch</h2>\
<ul>\
  <li>Commissions on sales that captured by Tuesday cutoff</li>\
  <li>Minus the 30-day clawback hold on any sale still within its refund window — those release into the next eligible batch</li>\
  <li>Minus refunds and chargebacks that landed in the period</li>\
</ul>\
\
<h2>How fast funds arrive</h2>\
<p>When the PayPal Payouts API dispatches at Friday 12:00 UTC, most recipients see funds in their PayPal balance within minutes. The recipient already needs a PayPal account to receive — if they don\'t, PayPal holds the transfer until they sign up. "Up to 30 minutes" is the planning window we tell affiliates, but most arrive in 1-2 minutes.</p>\
\
<h2>Minimum and rollover</h2>\

      title: 'Conversions, clicks & the 30-day clawback',

      body: '\
<h2>The attribution window</h2>\
<p>When someone clicks your share link, the <code>bb_click</code> UUID stays attached for <strong>30 days</strong>. Any sale that happens within that window using the same URL parameter (or the fallback cookie) attributes back to you — regardless of how many other devices, sites, or sessions the buyer visited in between.</p>\
\
<h2>The clawback window</h2>\
<p>Commissions are paid out per the <a href="/help/article?id=payout-schedule">biweekly Friday schedule</a>, but each individual commission is held for a <strong>30-day clawback window</strong> after the sale captures. If the buyer refunds or successfully charges back within that window, the corresponding commission is reversed.</p>\
\
<h2>In practice</h2>\
<ul>\
  <li>Sale captures on day 0 → commission is "pending"</li>\
  <li>Day 1-30 → commission stays pending while refund/chargeback risk exists</li>\
  <li>Day 30+ → commission is "released" and eligible for the next biweekly batch</li>\
  <li>Refund or chargeback during the 30 days → commission cancelled, balance adjusted</li>\
</ul>\
\
<h2>Sales report semantics</h2>\
<p>Your <a href="/affiliate#conv-soon">Sales Report</a> shows three statuses:</p>\
<ul>\
  <li><strong>Pending</strong> — sale captured but still within the 30-day window</li>\
  <li><strong>Released</strong> — past the window, eligible for the next payout batch</li>\
  <li><strong>Reversed</strong> — buyer refunded or successfully chargeback\'d; commission cancelled</li>\
</ul>\
\
<div class="callout"><strong>Why 30 days?</strong> Most products have 14-30 day refund windows. After 30 days the refund risk is low, so we can release commission with confidence and dispatch it on the next biweekly Friday.</div>'

  // ── Cross-link metadata (small subset for related cards) ───────────
  // Title comes from ARTICLES; this map is just so the related cards
  // can render without re-finding the article.

  function getArticleTitle(id) {
    var a = ARTICLES[id];
    return a ? a.title : id.replace(/-/g, ' ');
  }

  // ── Renderer ─────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"\']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ─── Help Center index (mirrored from affiliate-help.html) ───
  // Keep both files in sync if articles are added or renamed.
  var HELP_INDEX = [
    { id: 'start', title: 'Getting started', articles: [
      ['getting-started',   'Getting started as a Boost Boss affiliate'],
      ['saving-ads',        'Saving ads & browsing the catalog'],
    ]},
    { id: 'links', title: 'Share links & attribution', articles: [
      ['share-links',       'Share links & bb_click attribution'],
      ['clawback',          'Conversions, clicks & the 30-day clawback'],
    ]},
    { id: 'commission', title: 'Commissions & payouts', articles: [
      ['commission-model',  'Commission Model v2 — 70/30 split'],
      ['payout-setup',      'Setting up your PayPal payout'],
      ['payout-schedule',   'Payout schedule — biweekly Friday'],
    ]},
    { id: 'promote', title: 'Promotion', articles: [
      ['promote-social',    'Promoting on social — X, IG, TikTok, FB'],
      ['promote-newsletter','Promoting in newsletters & email'],
      ['exclusive-offers',  'Exclusive Offers & Premium Partners'],
    ]},
    { id: 'account', title: 'Compliance & account', articles: [
      ['ftc-disclosure',    'FTC disclosure & affiliate standards'],
      ['two-factor',        'Two-factor authentication & account'],
    ]},
  ];

  function findGroupFor(articleId) {
    for (var i = 0; i < HELP_INDEX.length; i++) {
      var g = HELP_INDEX[i];
      for (var j = 0; j < g.articles.length; j++) {
        if (g.articles[j][0] === articleId) return g.id;
      }
    }
    return null;
  }

  function renderHelpSidebar(activeArticleId) {
    var side = document.getElementById('help-side');
    if (!side) return;
    var activeGroup = activeArticleId ? findGroupFor(activeArticleId) : null;
    var html = HELP_INDEX.map(function (g) {
      var listHtml = g.articles.map(function (a) {
        var aid = a[0], atitle = a[1];
        var cls = (activeArticleId && activeArticleId === aid) ? ' class="active"' : '';
        return '<li><a' + cls + ' href="/help/article?id=' + encodeURIComponent(aid) + '">' + atitle + '</a></li>';
      }).join('');
      // Only the group containing the current article stays expanded on
      // article pages; the rest start collapsed for a tidier index.
      var groupCls = (activeGroup && activeGroup !== g.id) ? ' collapsed' : '';
      return '\
        <div class="hs-group' + groupCls + '" data-group="' + g.id + '">\
          <button class="hs-group-head" type="button">\
            <span>' + g.title + '</span>\
            <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>\
          </button>\
          <ul class="hs-list">' + listHtml + '</ul>\
        </div>';
    }).join('');
    side.innerHTML = html;
    Array.prototype.forEach.call(side.querySelectorAll('.hs-group-head'), function (btn) {
      btn.addEventListener('click', function () {
        btn.parentElement.classList.toggle('collapsed');
      });
    });
  }

  function render() {
    var id = (new URLSearchParams(location.search).get('id') || '').toLowerCase();
    var mount = document.getElementById('article-mount');
    var article = ARTICLES[id];

    renderHelpSidebar(id || null);

    if (!article) {
      mount.innerHTML = '\
        <div class="notfound">\
          <h1>Article not found</h1>\
          <p>The article you\'re looking for doesn\'t exist or has been renamed.</p>\
          <a href="/help">← Back to Help Center</a>\
        </div>';
      document.title = 'Help Center — Boost Boss Affiliate';
      return;
    }

    document.title = article.title + ' — Boost Boss Affiliate Help';

    var relatedHtml = '';
    if (article.related && article.related.length) {
      relatedHtml = '\
        <div class="related">\
          <h3>Related articles</h3>\
          <div class="related-list">' +
            article.related.map(function (rid) {
              return '<a href="/help/article?id=' + encodeURIComponent(rid) + '">' +
                       '<span>' + escapeHtml(getArticleTitle(rid)) + '</span>' +
                       '<span class="arrow">→</span>' +
                     '</a>';
            }).join('') +
          '</div>\
        </div>';
    }

    mount.innerHTML = '\
      <div class="crumbs">\
        <a href="/help">Help Center</a>\
        <span class="sep">/</span>\
        <span>' + escapeHtml(article.title) + '</span>\
      </div>\
      <article>\
        <h1>' + escapeHtml(article.title) + '</h1>\
        <p class="lede">' + escapeHtml(article.lede) + '</p>\
        ' + article.body + '\
      </article>\
      ' + relatedHtml;
  }

  render();
  window.addEventListener('popstate', render);
</script>
