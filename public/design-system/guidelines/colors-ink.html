<!-- @dsCard group="Colors" viewport="700x150" name="Ink ramp" subtitle="Text + dark-surface ink ramp, from headings to hairlines" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"><style>
*{box-sizing:border-box}body{margin:0;font-family:var(--font-body);background:#fff;color:var(--bb-ink)}
</style></head><body><style>
.swwrap{display:flex;gap:14px;flex-wrap:wrap;padding:20px}
.sw{display:flex;flex-direction:column;gap:7px}
.chip{width:118px;height:62px;border-radius:10px;border:1px solid rgba(15,15,26,.08)}
.nm{font-size:12px;font-weight:700}.hex{font-family:var(--font-mono);font-size:11px;color:var(--bb-muted)}
</style><div class="swwrap"><div class="sw"><div class="chip" style="background:var(--bb-ink)"></div><div class="nm">ink</div><div class="hex">#0F0F1A</div></div><div class="sw"><div class="chip" style="background:var(--bb-ink-800)"></div><div class="nm">ink-800</div><div class="hex">#1A1A2E</div></div><div class="sw"><div class="chip" style="background:var(--bb-ink-soft)"></div><div class="nm">ink-soft</div><div class="hex">#4B4B5E</div></div><div class="sw"><div class="chip" style="background:var(--bb-muted)"></div><div class="nm">muted</div><div class="hex">#6B7280</div></div><div class="sw"><div class="chip" style="background:var(--bb-line)"></div><div class="nm">line</div><div class="hex">#EAEAEF</div></div></div></body></html>
