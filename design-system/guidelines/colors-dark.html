<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css"><style>
*{box-sizing:border-box}body{margin:0;font-family:var(--font-body);background:#fff;color:var(--bb-ink)}
</style></head><body><style>
.swwrap{display:flex;gap:14px;flex-wrap:wrap;padding:20px}
.sw{display:flex;flex-direction:column;gap:7px}
.chip{width:118px;height:62px;border-radius:10px;border:1px solid rgba(15,15,26,.08)}
.nm{font-size:12px;font-weight:700}.hex{font-family:var(--font-mono);font-size:11px;color:var(--bb-muted)}
</style><div class="swwrap"><div class="sw"><div class="chip" style="background:var(--bb-surface-0)"></div><div class="nm">surface-0</div><div class="hex">#0B0B14</div></div><div class="sw"><div class="chip" style="background:var(--bb-surface-1)"></div><div class="nm">surface-1</div><div class="hex">#0F0F1A</div></div><div class="sw"><div class="chip" style="background:var(--bb-surface-2)"></div><div class="nm">surface-2</div><div class="hex">#15151F</div></div><div class="sw"><div class="chip" style="background:var(--bb-surface-3)"></div><div class="nm">surface-3</div><div class="hex">#1C1C2B</div></div></div></body></html>
